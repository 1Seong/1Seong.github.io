<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Seongwon Choi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* 베이스: 라벤더 화이트 — Tunic/Monument Valley */
  --navy:       #f7f5ff;
  --navy-2:     #ede9fb;
  --navy-3:     #ddd8f5;
  --navy-4:     #c9c2ee;
  /* 텍스트 */
  --cream:      #1a1440;
  --cream-2:    #2e2660;
  --cream-3:    #6b619a;
  /* 포인트: 비비드 인디고 */
  --gold:       #5040c8;
  --gold-light: #7060e0;
  --white:      #0d0926;
  /* 네비·푸터: 딥 미드나잇 퍼플 */
  --nav-bg:     #1a1440;
  --nav-ink:    #e2dcff;
  --nav-ink-2:  #8878cc;
  --nav-accent: #a0f0d8;
  /* 파도 */
  --wave-1:     #6b58e0;
  --wave-2:     #4878d8;
  --wave-3:     #a0f0d8;
  /* 규칙선 */
  --rule:       rgba(26,20,64,0.08);
  --rule-mid:   rgba(26,20,64,0.15);
  --sans:       'Outfit', 'Noto Sans KR', sans-serif;
  --nav-h:      72px;
  --max-w:      1080px;
  --pad:        clamp(1rem, 3.5vw, 2rem);
  --radius:     4px;
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--navy); color: var(--cream); line-height: 1.7; -webkit-font-smoothing: antialiased; }

/* ── NAV ── */
#nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--nav-bg);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  transition: box-shadow .3s;
}
#nav.scrolled { box-shadow: 0 4px 20px rgba(26,20,64,.3); }
.nav-inner {
  height: 60px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--pad);
}

/* 푸터 파도 */
.footer-wave {
  width: 100%; height: 60px;
  position: relative; overflow: hidden;
  background: var(--navy);
  pointer-events: none;
  margin-top: 6rem;
}
.footer-wave svg {
  position: absolute; bottom: 0; left: 0;
  will-change: transform;
}
.fwsvg1 { width: 2880px; }
.fwsvg2 { width: 2880px; opacity: .75; }
.fwsvg3 { width: 2880px; opacity: .5; }

.nav-logo { font-size: 1rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--nav-ink); text-decoration: none; }
.nav-logo span { color: var(--nav-accent); }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a { font-size: .72rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--nav-ink-2); text-decoration: none; transition: color .2s; }
.nav-links a:hover { color: var(--nav-accent); }

main { max-width: var(--max-w); margin: 0 auto; padding: calc(var(--nav-h) + 2.5rem) var(--pad) 0; }

.eyebrow { display: inline-flex; align-items: center; gap: .6rem; font-size: .88rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--gold); margin-bottom: 2.5rem; }
.eyebrow::before { content: ''; display: block; width: 28px; height: 2px; background: var(--gold); }
.rule { border: none; border-top: 1px solid var(--rule); margin: 5rem 0; }

#about { width: 100%; }
#about-grid { display: grid; grid-template-columns: 180px 1fr; gap: 4rem; align-items: center; max-width: 720px; }
@media(max-width:640px){ #about-grid { grid-template-columns: 1fr; gap: 2rem; } }

.about-photo { width: 180px; height: 180px; border-radius: 50%; background: var(--navy-3); border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--cream-3); font-size: .72rem; letter-spacing: .08em; overflow: hidden; flex-shrink: 0; box-shadow: 0 0 0 6px var(--navy-2), 0 0 0 7px rgba(80,64,200,0.2); }
.about-photo img { width: 100%; height: 100%; object-fit: cover; }
.about-tag { display: inline-block; font-size: .68rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--gold); padding: .25rem .75rem; margin-bottom: 1.25rem; }
.about-name { font-size: clamp(2.4rem, 5.5vw, 3.8rem); font-weight: 700; line-height: 1.05; letter-spacing: -.01em; color: var(--nav-bg); margin-bottom: .4rem; }
.about-name-en { font-size: .85rem; font-weight: 400; letter-spacing: .12em; color: var(--cream-3); margin-bottom: 2rem; }
.about-divider { width: 40px; height: 2px; background: var(--gold); margin-bottom: 1.5rem; }
.about-meta { font-size: .9rem; color: var(--cream-2); line-height: 2.2; }
.about-meta a { color: var(--cream-2); text-decoration: none; border-bottom: 1px solid var(--rule-mid); transition: color .2s; }
.about-meta a:hover { color: var(--gold-light); }
.link-icons { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: 2rem; }
.link-icon { display: inline-flex; align-items: center; gap: .5rem; padding: .5rem 1.1rem; border: 1px solid var(--rule-mid); font-size: .73rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--cream-2); text-decoration: none; background: var(--navy-3); transition: background .2s, color .2s, border-color .2s; }
.link-icon:hover { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.link-icon svg { width: 14px; height: 14px; fill: currentColor; }

.skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; align-items: end; }
.cup { position: relative; border-radius: 4px 4px 12px 12px; overflow: hidden; transition: transform .22s cubic-bezier(.34,1.56,.64,1); cursor: default; }
.cup:hover { transform: translateY(-6px); }
.other-works-grid { display: flex; flex-direction: column; gap: 1.25rem; }
.ow-row { display: flex; gap: 1.25rem; align-items: baseline; flex-wrap: wrap; }
.ow-cat { font-size: .68rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); flex-shrink: 0; width: 140px; padding-top: .15rem; }
.ow-tags { display: flex; gap: .5rem; flex-wrap: wrap; }
.ow-tag { font-size: .8rem; font-weight: 400; color: var(--cream-2); padding: .25rem .7rem; border: 1px solid var(--rule-mid); border-radius: 999px; background: var(--navy-2); transition: border-color .2s, color .2s; }
.ow-tag:hover { border-color: var(--gold); color: var(--gold-light); }
.cup-water { position: absolute; bottom: 0; left: 0; right: 0; z-index: 1; }
.wave-wrap { position: absolute; top: -20px; left: 0; width: 200%; height: 22px; pointer-events: none; }
.wave-svg { display: block; width: 100%; height: 22px; }
@keyframes cupWave { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.cwl1 { animation: cupWave 5.5s linear infinite; }
.cwl2 { animation: cupWave 8s linear infinite reverse; }
.cup:hover .cwl1 { animation-duration: 3.5s; }
.cup:hover .cwl2 { animation-duration: 5s; }
.cup-items { position: absolute; bottom: 0; left: 0; right: 0; z-index: 2; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 11px 10px; }
.cup-item { display: flex; align-items: center; gap: 7px; font-size: .82rem; font-weight: 500; padding: 6px 6px; border-radius: 4px; }
.cup-badge { width: 20px; height: 20px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; flex-shrink: 0; letter-spacing: -.02em; }
.cup-cat { position: absolute; top: 13px; left: 13px; right: 13px; font-size: .6rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; display: flex; align-items: center; gap: 5px; z-index: 3; }
.cup-cat-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.awards-col-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; align-items: start; }
@media(max-width:640px){ .awards-col-grid { grid-template-columns: 1fr; gap: 1.5rem; } }
.bead-col { display: flex; flex-direction: column; align-items: center; position: relative; }
.bead-col::before {
  content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
  width: 1.5px;
  background: linear-gradient(to bottom, transparent, var(--rule-mid) 8%, var(--rule-mid) 92%, transparent);
  transform: translateX(-50%); z-index: 0;
}
.bead-col-label-wrap {
  font-size: .68rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  margin-bottom: 1.25rem; position: relative; z-index: 1;
  padding: 4px 12px; border-radius: 999px;
  display: flex; align-items: center; gap: 5px;
  background: var(--navy);
}
.bead-col-label-wrap.award    { border: 1px solid var(--gold); color: var(--gold); }
.bead-col-label-wrap.activity { border: 1px solid #5ecfb0; color: #5ecfb0; }
.bead-col-label-wrap.cert     { border: 1px solid #9888ff; color: #9888ff; }
.bead-items {
  display: flex; flex-direction: column; align-items: center; gap: 0;
  position: relative; z-index: 1; width: 100%;
  transform-origin: top center; will-change: transform;
}
.bead {
  width: 200px; border-radius: var(--radius);
  padding: 9px 14px; margin: 4px 0;
  display: flex; flex-direction: column; gap: 2px;
  border: 1px solid var(--rule-mid);
  background: var(--navy-2);
  position: relative;
  transition: border-color .2s;
}
.bead:hover { border-color: var(--gold); }
.bead::before, .bead::after {
  content: ''; position: absolute; left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--rule-mid);
}
.bead::before { top: -8px; }
.bead::after  { bottom: -8px; }
.bead-title { font-size: .82rem; font-weight: 500; color: var(--cream); line-height: 1.3; }
.bead-org   { font-size: .72rem; color: var(--cream-3); }
.bead-date  { font-size: .68rem; color: var(--cream-3); margin-top: 2px; font-variant-numeric: tabular-nums; }
.awards-empty-col { font-size: .8rem; color: var(--cream-3); font-style: italic; padding: .5rem 0; }

.projects-list { display: flex; flex-direction: column; }
.project-card { display: grid; grid-template-columns: 58% 1fr; gap: 4rem; align-items: center; padding: 7rem 0; border-bottom: 1px solid var(--rule); }
.project-card:first-child { border-top: 1px solid var(--rule); }
.project-card.reverse { direction: rtl; }
.project-card.reverse > * { direction: ltr; }
@media(max-width:680px){ .project-card, .project-card.reverse { grid-template-columns: 1fr; direction: ltr; gap: 2rem; padding: 3.5rem 0; } }

.proj-media { position: relative; }
.proj-slider { width: 100%; aspect-ratio: 16/9; background: var(--navy-3); border: 1px solid var(--rule-mid); overflow: hidden; position: relative; transition: border-color .3s; }
.proj-slider:hover { border-color: var(--gold); }
.proj-slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .4s ease; }
.proj-slide.active { opacity: 1; }
.proj-slide img, .proj-slide iframe { width: 100%; height: 100%; object-fit: cover; }
.slide-placeholder { display: flex; flex-direction: column; align-items: center; gap: .75rem; color: var(--cream-3); font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; }
.slide-placeholder svg { width: 40px; height: 40px; stroke: var(--cream-3); fill: none; stroke-width: 1.5; }
.slide-type-badge { position: absolute; top: .75rem; left: .75rem; font-size: .65rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: .2rem .55rem; background: var(--gold); color: var(--navy); pointer-events: none; border-radius: 2px; }
.slider-nav { display: flex; align-items: center; justify-content: space-between; margin-top: .75rem; }
.slider-btn { width: 28px; height: 28px; border: none; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--cream-3); padding: 0; transition: color .2s; }
.slider-btn:hover { color: var(--gold-light); }
.slider-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
.slider-dots { display: flex; gap: .4rem; align-items: center; }
.slider-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--navy-4); border: 1px solid var(--rule-mid); cursor: pointer; transition: all .25s; }
.slider-dot.active { width: 20px; border-radius: 3px; background: var(--gold); border-color: var(--gold); }

.proj-info { display: flex; flex-direction: column; gap: 1rem; }
.proj-index { font-size: .72rem; font-weight: 600; letter-spacing: .18em; color: var(--gold); text-transform: uppercase; }
.proj-title { font-size: clamp(1.9rem, 3.5vw, 2.8rem); font-weight: 700; line-height: 1.1; letter-spacing: -.01em; color: var(--nav-bg); }
.proj-subtitle { font-size: .88rem; color: var(--cream-3); }
.proj-tags { display: flex; gap: .4rem; flex-wrap: wrap; margin: .2rem 0; }
.proj-tag { font-size: .7rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: .25rem .65rem; border: 1px solid var(--rule-mid); color: var(--cream-3); border-radius: var(--radius); }
.proj-meta-row { display: flex; gap: 1.5rem; flex-wrap: wrap; padding: .9rem 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
.proj-meta-item strong { display: block; font-size: .62rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--cream-3); margin-bottom: .15rem; }
.proj-meta-item span { font-size: .88rem; color: var(--cream-2); }
.proj-summary { font-size: .98rem; color: var(--cream-2); line-height: 1.85; }
.proj-show-more { display: inline-flex; align-items: center; gap: .6rem; margin-top: .4rem; align-self: flex-start; font-size: .75rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; padding: .7rem 1.5rem; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-family: var(--sans); border-radius: var(--radius); transition: background .2s, color .2s; }
.proj-show-more:hover { background: var(--gold); color: var(--navy); }
.proj-show-more svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; transition: transform .2s; }
.proj-show-more:hover svg { transform: translateX(3px); }

#detail-view { display: none; padding-top: 2rem; }
#detail-view.visible { display: block; }
.detail-back { display: inline-flex; align-items: center; gap: .5rem; font-size: .72rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--cream-3); cursor: pointer; background: none; border: none; font-family: var(--sans); margin-bottom: 3rem; transition: color .2s; }
.detail-back:hover { color: var(--gold-light); }
.detail-back svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; }
.detail-eyebrow { font-size: .68rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: .75rem; }
.detail-title { font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 700; line-height: 1.05; letter-spacing: -.02em; color: var(--white); margin-bottom: .4rem; }
.detail-subtitle { font-size: .9rem; color: var(--cream-3); margin-bottom: 2.5rem; }
.detail-media { width: 100%; aspect-ratio: 16/9; background: var(--navy-3); border: 1px solid var(--rule-mid); overflow: hidden; position: relative; margin-bottom: 1rem; }
.detail-media-slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .4s ease; }
.detail-media-slide.active { opacity: 1; }
.detail-media-slide img, .detail-media-slide iframe { width: 100%; height: 100%; object-fit: cover; }
.detail-media-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 4rem; }
.detail-media-dots { display: flex; gap: .4rem; }

/* 본문 + 사이드바 레이아웃 */
.detail-body { display: grid; grid-template-columns: 1fr 140px; gap: 7rem; align-items: start; }
@media(max-width:640px){ .detail-body { grid-template-columns: 1fr; gap: 2.5rem; } }

/* 본문 섹션들 */
.detail-section {
  padding: 2rem 0;
  border-bottom: 1px solid var(--rule);
  position: relative;
  transition: opacity .4s ease;
}
.detail-section:first-child { border-top: 1px solid var(--rule); }
.detail-section:last-child { border-bottom: none; }

.detail-section::before {
  content: '';
  position: absolute;
  left: -24px; top: 0; bottom: 0;
  width: 1.5px;
  background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity .5s ease;
  border-radius: 2px;
}
.detail-section::after {
  content: '';
  position: absolute;
  left: -24px; top: 0; bottom: 0;
  width: 160px;
  background: linear-gradient(to right, rgba(80,64,200,.018), transparent);
  opacity: 0;
  transition: opacity .5s ease;
  pointer-events: none;
}
.detail-section.in-view::before { opacity: .4; }
.detail-section.in-view::after { opacity: 1; }
.detail-section:not(.in-view) { opacity: .65; }
.detail-section-label { font-size: .88rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.25rem; }
.detail-section-text { font-size: .9rem; color: var(--cream-2); line-height: 1.85; }
.detail-section-text p { margin-bottom: .75rem; }
.detail-section-text p:last-child { margin-bottom: 0; }

/* contribution 아이템 */
.contributions { display: flex; flex-direction: column; gap: 1.5rem; }
.contribution { background: var(--navy-2); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; display: flex; transition: border-color .2s; }
.contribution:hover { border-color: var(--gold); }
.contribution-img { width: 130px; flex-shrink: 0; background: var(--navy-3); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.contribution-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.contribution-img-placeholder { font-size: .65rem; color: var(--cream-3); letter-spacing: .06em; text-transform: uppercase; padding: 1rem; text-align: center; }
.contribution-body { padding: 1.1rem 1.25rem; flex: 1; min-width: 0; }
.contribution-title { font-size: .95rem; font-weight: 600; color: var(--white); margin-bottom: .5rem; line-height: 1.3; }
.contribution-desc { font-size: .855rem; color: var(--cream-2); line-height: 1.85; }

/* 회고 */
.retro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
@media(max-width:500px){ .retro-grid { grid-template-columns: 1fr; } }
.retro-card { padding: 1.1rem 1.25rem; border-radius: var(--radius); border: 1px solid var(--rule); }
.retro-card.good { border-color: rgba(64,160,100,.25); background: rgba(64,160,100,.06); }
.retro-card.bad  { border-color: rgba(200,151,58,.25);  background: rgba(200,151,58,.06); }
.retro-card-label { font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; margin-bottom: .6rem; }
.retro-card.good .retro-card-label { color: #4a9e6a; }
.retro-card.bad  .retro-card-label { color: var(--gold); }
.retro-card-text { font-size: .855rem; color: var(--cream-2); line-height: 1.8; }
.feedback-chart { display: flex; flex-direction: column; gap: .75rem; }
.feedback-row { display: flex; align-items: center; gap: 1rem; }
.feedback-label { font-size: .8rem; color: var(--cream-2); width: 60px; flex-shrink: 0; }
.feedback-bar-wrap { flex: 1; height: 8px; background: var(--navy-3); border-radius: 4px; overflow: hidden; }
.feedback-bar { height: 100%; border-radius: 4px; background: linear-gradient(to right, #5040c8, #a0f0d8); transition: width .8s cubic-bezier(.22,1,.36,1); }
.feedback-val { font-size: .78rem; color: var(--cream-3); width: 44px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

/* 사이드바 */
.detail-sidebar { position: sticky; top: calc(var(--nav-h) + 2rem); }
.sidebar-block { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--rule); }
.sidebar-block:last-child { border-bottom: none; }
.sidebar-label { font-size: .62rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--gold); margin-bottom: .85rem; }
.sidebar-value { font-size: .82rem; color: var(--cream-2); line-height: 2; }
.sidebar-link { display: flex; align-items: center; gap: .5rem; font-size: .78rem; font-weight: 500; color: var(--cream-2); text-decoration: none; padding: .5rem .75rem; border: 1px solid var(--rule-mid); background: var(--navy-3); margin-bottom: .4rem; border-radius: var(--radius); transition: background .2s, color .2s, border-color .2s; }
.sidebar-link:hover { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.sidebar-link svg { width: 12px; height: 12px; stroke: currentColor; fill: none; }

footer { background: var(--nav-bg); padding: 0; }
.footer-wave {
  width: 100%; height: 40px;
  position: relative; overflow: hidden; line-height: 0;
  background: var(--bg);
}
.footer-wave svg {
  position: absolute; bottom: 0; left: 0;
  height: 40px; will-change: transform;
}
.fwsvg1 { width: 2880px; }
.fwsvg2 { width: 2880px; opacity: .65; }
.fwsvg3 { width: 2880px; opacity: .38; }
.footer-inner { max-width: var(--max-w); margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; padding: 2.5rem var(--pad); }

.detail-nav-btn:hover { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.detail-nav-btn:disabled { opacity: .3; cursor: default; pointer-events: none; }

.shelf-row { display: flex; flex-direction: row; gap: 6px; align-items: flex-end; padding: 0 8px; flex-wrap: wrap; }
.shelf-floor { height: 6px; background: var(--rule-mid); border-radius: 2px; margin: 0 0 1rem; }
.shelf-legend { display: flex; gap: 1.25rem; flex-wrap: wrap; padding: 0 8px; }

.book-wrap { position: relative; flex-shrink: 0; width: 38px; cursor: default; z-index: 1; }
.book-wrap:hover { z-index: 500; }
.book-inner {
  position: relative; width: 38px;
  transition: transform .4s cubic-bezier(.34,1.2,.64,1), box-shadow .4s;
}
.book-wrap:hover .book-inner {
  transform: translateY(-60px);
  box-shadow: 0 20px 40px rgba(0,0,0,.5);
}
.book-spine-el {
  width: 38px; border-radius: 3px;
  border-left: 3px solid rgba(255,255,255,.2);
  display: flex; flex-direction: column; padding: 10px 5px;
  position: relative; z-index: 1;
}
.book-spine { writing-mode: vertical-lr; font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-family: var(--sans); }
.book-cover-panel {
  position: absolute; bottom: 0; left: 0;
  width: 0; height: 100%; border-radius: 3px;
  overflow: hidden; z-index: 3;
  transition: width .4s cubic-bezier(.34,1.1,.64,1);
}
.book-wrap:hover .book-cover-panel { width: calc(var(--book-h) * 2 / 3); }
.book-cover-img { height: 100%; width: auto; object-fit: cover; display: block; }
.book-cover-bg { height: 100%; width: 100%; }
.book-popup {
  position: absolute; top: 0; width: 180px;
  background: var(--navy-2); border: 1px solid var(--rule-mid);
  border-radius: var(--radius); padding: 12px;
  opacity: 0; pointer-events: none;
  transform: translateX(-4px);
  transition: opacity .2s ease, transform .2s ease;
  z-index: 400;
}
.book-wrap:hover .book-popup { opacity: 1; pointer-events: auto; transform: translateX(0); transition-delay: .28s; }
.book-popup-genre { font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; margin-bottom: 5px; }
.book-popup-title { font-size: .82rem; font-weight: 500; color: var(--cream); line-height: 1.35; margin-bottom: 2px; }
.book-popup-author { font-size: .75rem; color: var(--cream-3); margin-bottom: 6px; }
.book-popup-memo { font-size: .75rem; color: var(--cream-3); line-height: 1.5; border-top: 1px solid var(--rule); padding-top: 6px; }

.section-highlight { position: relative; overflow: visible; }
.section-highlight::before { display: none; }

#section-light {

}
#section-light.visible { opacity: 1; }

/* ── 프로젝트 scale up + 카드 light ── */
.project-card {

.project-card::after {
  content: '';
  position: absolute;

  opacity: 0;
  transition: opacity .5s ease;
  pointer-events: none;
}
.project-card.in-view {
  transform: scale(1);
  opacity: 1;
}

function buildSkills(){
  const ITEM_H=34, PAD_B=10, CAT_H=44, MIN_CUP_H=180;

    platform:{bg:'#0c1e2a',border:'#285878',water:'#1e4860',wave2:'#2c5878',catColor:'#80c8e0',itemColor:'#a8ddf0',badgeBg:'rgba(128,200,224,.2)',badgeColor:'#80c8e0'},

  const g=document.getElementById('skills-grid');

  SKILLS.forEach((cat,idx)=>{

    const n=cat.items.length;
    const waterH=Math.max(44, n*ITEM_H+PAD_B+20);

    const div=document.createElement('div');
    div.className='cup';
    div.style.cssText=`background:${t.bg};border:1.5px solid ${t.border};height:${cupH}px;`;

    const itemsHTML=cat.items.map(it=>{

      return `<div class="cup-item" style="color:${t.itemColor}">${badge}${it.name}</div>`;
    }).join('');

    div.innerHTML=`

function buildAwards(){
  const grid = document.getElementById('awards-col-grid');
  if(!grid) return;
  const cols = [
    { key:'수상',         label:'수상',          cls:'award',    icon:'ti-trophy' },
    { key:'대외활동',     label:'활동',          cls:'activity', icon:'ti-users' },
    { key:'시험및자격증', label:'시험 및 자격증', cls:'cert',     icon:'ti-certificate' },
  ];

  const STIFFNESS = 0.04, DAMPING = 0.88, MAX_ANGLE = 3.5;

  cols.forEach(col => {
    const items = AWARDS[col.key] || [];
    const colEl = document.createElement('div');
    colEl.className = 'bead-col';

    const beadsHTML = items.length
      ? items.map(a=>`
          <div class="bead">
            <div class="bead-title">${a.title}</div>
            <div class="bead-org">${a.org}</div>
            <div class="bead-date">${a.date}</div>
          </div>`).join('')
      : `<div class="awards-empty-col">— 추후 업데이트 예정 —</div>`;

    colEl.innerHTML = `
      <div class="bead-col-label-wrap ${col.cls}">
        <i class="ti ${col.icon}" aria-hidden="true"></i>${col.label}
      </div>
      <div class="bead-items">${beadsHTML}</div>`;
    grid.appendChild(colEl);

    // 스프링 물리
    const chain = colEl.querySelector('.bead-items');
    let angle = 0, velocity = 0, target = 0, raf = null;

    function tick(){
      velocity = (velocity + (target - angle) * STIFFNESS) * DAMPING;
      angle += velocity;
      chain.style.transform = `rotate(${angle}deg)`;
      if(Math.abs(velocity) < 0.001 && Math.abs(angle - target) < 0.001){
        chain.style.transform = `rotate(${target}deg)`;
        cancelAnimationFrame(raf); raf = null; return;
      }
      raf = requestAnimationFrame(tick);
    }
    function start(){ if(!raf) raf = requestAnimationFrame(tick); }

    colEl.addEventListener('mouseenter', () => { target = MAX_ANGLE; start(); });
    colEl.addEventListener('mouseleave', () => { target = 0; start(); });
    colEl.addEventListener('mousemove', e => {
      const r = colEl.getBoundingClientRect();
      target = ((e.clientX - r.left) / r.width - 0.5) * MAX_ANGLE * 2;
      start();
    });
  });
}

function makeSlider(media,cont,dots,prev,next){
  let cur=0; const sl=[];
  media.forEach((m,i)=>{
    const s=document.createElement('div'); s.className='proj-slide'+(i===0?' active':'');
    s.innerHTML=m.src?(m.type==='video'?`<iframe src="${m.src}" frameborder="0" allowfullscreen></iframe>`:`<img src="${m.src}" alt="${m.label}" loading="lazy">`):`<div class="slide-placeholder">${m.type==='video'?IC.vid:IC.img}<span>${m.label}</span></div>`;
    if(m.label){const b=document.createElement('div');b.className='slide-type-badge';b.textContent=m.label;s.appendChild(b);}
    cont.appendChild(s); sl.push(s);
  });
  media.forEach((_,i)=>{
    const d=document.createElement('div'); d.className='slider-dot'+(i===0?' active':'');
    d.addEventListener('click',()=>go(i)); dots.appendChild(d);
  });
  function go(n){sl[cur].classList.remove('active');dots.children[cur].classList.remove('active');cur=(n+sl.length)%sl.length;sl[cur].classList.add('active');dots.children[cur].classList.add('active');}
  if(prev)prev.addEventListener('click',e=>{e.stopPropagation();go(cur-1);});
  if(next)next.addEventListener('click',e=>{e.stopPropagation();go(cur+1);});
}

function showDetail(id){

  document.getElementById('d-title').textContent=p.title;
  document.getElementById('d-subtitle').textContent=p.subtitle;
  const dm=document.getElementById('d-media'); dm.innerHTML='';
  const dd=document.getElementById('d-dots'); dd.innerHTML='';
  let dc=0; const ds=[];
  p.media.forEach((m,i)=>{
    const s=document.createElement('div'); s.className='detail-media-slide'+(i===0?' active':'');
    s.innerHTML=m.src?(m.type==='video'?`<iframe src="${m.src}" frameborder="0" allowfullscreen></iframe>`:`<img src="${m.src}" alt="${m.label}">`):`<div class="slide-placeholder">${m.type==='video'?IC.vid:IC.img}<span>${m.label}</span></div>`;
    dm.appendChild(s); ds.push(s);
    const d=document.createElement('div'); d.className='slider-dot'+(i===0?' active':'');
    d.addEventListener('click',()=>dgo(i)); dd.appendChild(d);

  document.getElementById('d-next').onclick=()=>dgo(dc+1);

  const metaRows=Object.entries(p.meta).map(([k,v])=>`
    <div style="margin-bottom:.5rem">
      <span style="font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)">${k}</span><br>
      <span style="font-size:.82rem;color:var(--cream-2)">${v}</span>
    </div>`).join('');
  const linksHTML=p.links.length
    ? p.links.map(l=>`<a class="sidebar-link" href="${l.url}" target="_blank" rel="noopener">${IC.ext} ${l.label}</a>`).join('')
    : `<span style="font-size:.8rem;color:var(--cream-3);font-style:italic">— 준비 중 —</span>`;
  document.getElementById('d-sidebar').innerHTML=`
    <div class="sidebar-block"><div class="sidebar-label">Info</div><div class="sidebar-value">${metaRows}</div></div>
    <div class="sidebar-block"><div class="sidebar-label">Tags</div><div class="proj-tags">${p.tags.map(t=>`<span class="proj-tag">${t}</span>`).join('')}</div></div>
    <div class="sidebar-block"><div class="sidebar-label">Links</div>${linksHTML}</div>`;

  // 본문 섹션들
  const main = document.getElementById('d-main');
  main.innerHTML = '';

  const sections = [];

  // 1. Role
  sections.push(`<div class="detail-section">
    <div class="detail-section-label">나의 역할</div>
    <div class="detail-section-text">${p.role}</div>
  </div>`);

  // 2. Activities (있을 때만)
  if(p.activities && p.activities.length){
    const tagsHTML=p.activities.map(a=>`<span class="ow-tag">${a}</span>`).join('');
    sections.push(`<div class="detail-section">
      <div class="detail-section-label">활동</div>
      <div class="ow-tags">${tagsHTML}</div>
    </div>`);
  }

  // 3. Technical Contributions
  function contribCard(c){
    const imgHTML = c.images && c.images.length
      ? `<div class="contribution-img"><img src="${c.images[0]}" alt="${c.title}"></div>`
      : '';
    return `<div class="contribution">${imgHTML}<div class="contribution-body"><div class="contribution-title">${c.title}</div><div class="contribution-desc">${c.desc}</div></div></div>`;
  }

  const contribHTML = p.contributions.map(contribCard).join('');
  sections.push(`<div class="detail-section">
    <div class="detail-section-label">Technical Contributions</div>
    <div class="contributions">${contribHTML}</div>
  </div>`);

  // 4. Optimizations (있을 때만)
  if(p.optimizations && p.optimizations.length){
    const optHTML = p.optimizations.map(contribCard).join('');
    sections.push(`<div class="detail-section">
      <div class="detail-section-label">최적화</div>
      <div class="contributions">${optHTML}</div>
    </div>`);
  }

  // 5. Retrospective
  if(p.retrospective){
    const r=p.retrospective;
    sections.push(`<div class="detail-section">
      <div class="detail-section-label">회고</div>
      <div class="retro-grid">
        <div class="retro-card good">
          <div class="retro-card-label">좋았던 점</div>
          <div class="retro-card-text">${r.good}</div>
        </div>
        <div class="retro-card bad">
          <div class="retro-card-label">아쉬웠던 점</div>
          <div class="retro-card-text">${r.bad}</div>
        </div>
      </div>
    </div>`);
  }

  // 5-1. 유저 피드백 그래프 (있을 때만)
  if(p.feedback && p.feedback.length){
    const rows = p.feedback.map(f=>{
      const pct = Math.round(f.value / f.max * 100);
      return `<div class="feedback-row">
        <div class="feedback-label">${f.label}</div>
        <div class="feedback-bar-wrap"><div class="feedback-bar" style="width:0" data-pct="${pct}"></div></div>
        <div class="feedback-val">${f.value}${f.unit}</div>
      </div>`;
    }).join('');
    sections.push(`<div class="detail-section" id="d-feedback-section">
      <div class="detail-section-label">유저 피드백</div>
      <div class="feedback-chart">${rows}</div>
    </div>`);
  }

  // 6. Other Contributions (있을 때만)
  if(p.other_contributions){
    const otherHTML = Array.isArray(p.other_contributions)
      ? p.other_contributions.map(contribCard).join('')
      : `<div class="detail-section-text">${p.other_contributions}</div>`;
    sections.push(`<div class="detail-section">
      <div class="detail-section-label">기타 기여 (기획 · 아트)</div>
      <div class="contributions">${otherHTML}</div>
    </div>`);
  }

  main.innerHTML = sections.join('');

  // 피드백 바 애니메이션
  requestAnimationFrame(()=>{
    main.querySelectorAll('.feedback-bar[data-pct]').forEach(bar=>{
      requestAnimationFrame(()=>{ bar.style.width = bar.dataset.pct + '%'; });
    });
  });

  // 하단 네비 버튼
  const idx=PROJECT_ORDER.indexOf(id);
  const prevId=idx>0?PROJECT_ORDER[idx-1]:null;
  const nextId=idx<PROJECT_ORDER.length-1?PROJECT_ORDER[idx+1]:null;
  const prevTitle=prevId?PROJECTS[prevId].title:'';
  const nextTitle=nextId?PROJECTS[nextId].title:'';
  const navRow=document.getElementById('d-nav-row');
  navRow.innerHTML=`
    <button class="detail-nav-btn" onclick="showDetail('${prevId}')" ${!prevId?'disabled':''}>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      ${prevId?prevTitle:''}
    </button>
    <button class="detail-nav-btn" onclick="showList()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Projects
    </button>
    <button class="detail-nav-btn" onclick="showDetail('${nextId}')" ${!nextId?'disabled':''}>
      ${nextId?nextTitle:''}
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;

  document.getElementById('list-view').style.display='none';
  document.getElementById('detail-view').classList.add('visible');
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>{ onScroll(); }, 50);
}

function showList(){
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('list-view').style.display='';
  // 상세 페이지 하이라이트 초기화
  document.querySelectorAll('.detail-section').forEach(el => el.classList.remove('in-view'));
  _prevDetail = null;
  // 돌아올 때 해당 프로젝트 카드로 스크롤
  if(_currentDetailId){
    requestAnimationFrame(()=>{
      const card=document.querySelector(`.proj-show-more[data-id="${_currentDetailId}"]`);
      if(card){
        const rect=card.closest('.project-card');
        if(rect) rect.scrollIntoView({behavior:'smooth',block:'center'});
      }
    });
  }
}

window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('scrolled',window.scrollY>10);
},{passive:true});

function buildOtherWorks(){
  const g=document.getElementById('other-works-grid');
  if(!g||!OTHER_WORKS) return;
  OTHER_WORKS.forEach(row=>{
    const div=document.createElement('div'); div.className='ow-row';
    const tags=row.items.map(item=>`<span class="ow-tag">${item}</span>`).join('');
    div.innerHTML=`<div class="ow-cat">${row.category}</div><div class="ow-tags">${tags}</div>`;
    g.appendChild(div);
  });
}
function buildBooks(){
  const el=document.getElementById('shelf');
  const legendEl=document.getElementById('shelf-legend');
  if(!el||!BOOKS) return;
  const GENRE_COLORS={
    "언어":         {bg:"#3d3890",border:"#7060e0",color:"#e0d8ff"},
    "엔진":         {bg:"#1a4a68",border:"#4090c0",color:"#b8e4f8"},
    "소프트웨어 개발":{bg:"#1a4830",border:"#40a060",color:"#a8e8c0"},
    "네트워크":     {bg:"#4a2868",border:"#9060c0",color:"#e0b8f8"},
  };
  BOOKS.forEach(b=>{
    const g=GENRE_COLORS[b.genre]||GENRE_COLORS["언어"];
    const coverW = Math.round(b.h * 2 / 3);
    const wrap=document.createElement('div');
    wrap.className='book-wrap';
    wrap.style.setProperty('--book-h', b.h + 'px');
    const coverContent=b.cover
      ?`<img class="book-cover-img" src="${b.cover}" alt="${b.title} 표지">`
      :`<div class="book-cover-bg" style="background:${g.bg}"></div>`;
    wrap.innerHTML=`
      <div class="book-inner" style="height:${b.h}px;">
        <div class="book-spine-el" style="height:${b.h}px;background:${g.bg};">
          <div class="book-spine" style="color:${g.color}">${b.title}</div>
        </div>
        <div class="book-cover-panel">${coverContent}</div>
        <div class="book-popup" style="left:${coverW + 8}px;">
          <div class="book-popup-genre" style="color:${g.color}">${b.genre}</div>
          <div class="book-popup-title">${b.title}</div>
          <div class="book-popup-author">${b.author}</div>
          <div class="book-popup-memo">${b.memo}</div>
        </div>
      </div>`;
    el.appendChild(wrap);
  });
  Object.entries(GENRE_COLORS).forEach(([name,g])=>{
    const item=document.createElement('div');
    item.className='shelf-legend-item';
    item.innerHTML=`<div class="shelf-legend-dot" style="background:${g.bg};border:1.5px solid ${g.color}88"></div>${name}`;
    legendEl.appendChild(item);
  });
}
/* ── 스크롤 기반 하이라이트 ── */
window._cardObserver = null; // buildProjects에서 참조 방지용

buildAbout();buildSkills();buildAwards();buildProjects();buildOtherWorks();buildBooks();

// 섹션: 뷰포트 중심에 가장 가까운 섹션 하나에만 라이트 효과
const sections = Array.from(document.querySelectorAll('#about, #skills, #awards, #projects, #other-works, #books'));
sections.forEach(el => el.classList.add('section-highlight'));

// 프로젝트 카드: 뷰포트 중심에 가장 가까운 카드 하나만 scale up
function getCards(){ return Array.from(document.querySelectorAll('.project-card')); }

function getClosest(els){
  const mid = window.innerHeight / 2;
  let best = null, bestDist = Infinity;
  els.forEach(el => {
    const rect = el.getBoundingClientRect();
    const elMid = rect.top + rect.height / 2;
    const dist = Math.abs(elMid - mid);
    if(dist < bestDist){ bestDist = dist; best = el; }
  });
  return best;
}

const lightEl = document.getElementById('section-light');
let _prevSection = null;
let _prevCard = null;
let _prevDetail = null;

function setLight(target){
  if(!target){
    lightEl.classList.remove('visible');
    _prevSection = null;
    return;
  }
  const r = target.getBoundingClientRect();
  const nextHr = target.nextElementSibling;
  let bottom = r.bottom;
  if(nextHr && (nextHr.classList.contains('rule') || nextHr.tagName === 'HR')){
    bottom = nextHr.getBoundingClientRect().bottom;
  }
  lightEl.style.top = r.top + 'px';
  lightEl.style.height = (bottom - r.top) + 'px';
  lightEl.classList.add('visible');
}

let ticking = false;
function onScroll(){
  if(ticking) return;
  ticking = true;
  requestAnimationFrame(()=>{
    const isDetail = document.getElementById('detail-view').classList.contains('visible');

    if(isDetail){
      // 상세 페이지: detail-section 하나만
      const detailSections = Array.from(document.querySelectorAll('.detail-section'));
      const activeDetail = getClosest(detailSections);
      detailSections.forEach(el => {
        const on = el === activeDetail;
        if(on !== el.classList.contains('in-view')) el.classList.toggle('in-view', on);
      });
      if(activeDetail !== _prevDetail){
        _prevDetail = activeDetail;
        setLight(activeDetail);
      } else {
        setLight(activeDetail);
      }
    } else {
      _prevDetail = null;

      // 섹션 하나만 (projects 제외 → light)
      const activeSection = getClosest(sections);
      sections.forEach(el => {
        const on = el === activeSection;
        if(on !== el.classList.contains('in-view')) el.classList.toggle('in-view', on);
      });

      if(activeSection !== _prevSection){
        _prevSection = activeSection;
        if(activeSection && activeSection.id !== 'projects'){
          lightEl.classList.remove('visible');
          // 위치 먼저 즉시 세팅, opacity만 fade
          const r = activeSection.getBoundingClientRect();
          const nextHr = activeSection.nextElementSibling;
          let bottom = r.bottom;
          if(nextHr && (nextHr.classList.contains('rule') || nextHr.tagName === 'HR')){
            bottom = nextHr.getBoundingClientRect().bottom;
          }
          lightEl.style.top = r.top + 'px';
          lightEl.style.height = (bottom - r.top) + 'px';
          requestAnimationFrame(()=> requestAnimationFrame(()=> lightEl.classList.add('visible')));
        } else {
          lightEl.classList.remove('visible');
        }
      } else if(activeSection && activeSection.id !== 'projects'){
        setLight(activeSection);
      }

      // 프로젝트 카드 — projects 섹션이 active일 때만
      const cards = getCards();
      if(cards.length && activeSection && activeSection.id === 'projects'){
        const activeCard = getClosest(cards);
        cards.forEach(el => {
          const on = el === activeCard;
          if(on !== el.classList.contains('in-view')) el.classList.toggle('in-view', on);
        });
      } else {
        // projects 섹션이 아니면 카드 모두 비활성
        getCards().forEach(el => el.classList.remove('in-view'));
      }
    }

    ticking = false;
  });
}

window.addEventListener('scroll', onScroll, { passive: true });
onScroll();


/* ── 파도 애니메이션 (rAF 픽셀 제어) ── */
(function(){
  const layers = [
    { id: '.fwsvg1', speed: 1.2, tile: 540, x: 0   },
    { id: '.fwsvg2', speed: 0.8, tile: 360, x: 0   },
    { id: '.fwsvg3', speed: 1.0, tile: 180, x: 0   },
  ];
  layers.forEach(l => { l.el = document.querySelector(l.id); });
  let last = null;
  function tick(ts) {
    const dt = last ? Math.min(ts - last, 32) : 16;
    last = ts;
    layers.forEach(l => {
      if (!l.el) return;
      l.x = (l.x + l.speed * (dt / 16)) % l.tile;
      l.el.style.transform = `translateX(${-l.x}px)`;
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
